name: ❓ Question / سؤال
description: طرح سؤال حول المشروع | Ask a question about the project
title: "question: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        هل لديك سؤال؟ يسعدنا المساعدة! يرجى التحقق أولاً من [التوثيق](README.md) و[الأسئلة السابقة](https://github.com/Top1-Quantum-AI/Top-Quantum.github.io/issues?q=label%3Aquestion).
        _Have a question? We're happy to help! Please check the [docs](README.md) and [previous questions](https://github.com/Top1-Quantum-AI/Top-Quantum.github.io/issues?q=label%3Aquestion) first._

  - type: textarea
    id: question
    attributes:
      label: سؤالك | Your Question
      description: اطرح سؤالك بوضوح مع أي سياق يساعد على الإجابة.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: المجال | Area
      options:
        - إعداد البيئة / Setup
        - Frontend / React + TypeScript
        - Backend / Express.js
        - Quantum / الحوسبة الكمية
        - AI / OpenMythos
        - Docker / Kubernetes
        - CI/CD
        - أخرى / Other
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: ما الذي جربته؟ | What Have You Tried?
      description: أخبرنا بما حاولت فعله للإجابة على السؤال بنفسك.

  - type: checkboxes
    id: checklist
    attributes:
      label: قائمة التحقق | Checklist
      options:
        - label: قرأت README.md و CONTRIBUTING.md
          required: true
        - label: بحثت في Issues السابقة ولم أجد إجابة
          required: true
