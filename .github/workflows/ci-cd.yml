# Advanced CI/CD Pipeline for Quantum AI System
# خط إنتاج متقدم للنظام الكمي مع الأمان والاختبارات

name: Quantum AI System CI/CD

on:
  push:
    branches: [ main, develop, 'feature/*', 'hotfix/*' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Weekly security scan
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
      run_quantum_tests:
        description: 'Run quantum hardware tests'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'
  DOCKER_REGISTRY: 'ghcr.io'
  IMAGE_NAME: 'quantum-ai-system'
  KUBERNETES_NAMESPACE: 'quantum-ai-system'

jobs:
  # مرحلة التحقق من الكود والأمان
  code-quality:
    name: 'Code Quality & Security'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # للتحليل الكامل
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci --prefer-offline --no-audit
        npm run postinstall || true
    
    - name: TypeScript Type Check
      run: |
        npm run typecheck
        echo "✅ TypeScript compilation successful"
    
    - name: ESLint Code Analysis
      run: |
        npm run lint -- --format=json --output-file=eslint-report.json
        npm run lint
        echo "✅ ESLint analysis completed"
    
    - name: Prettier Code Format Check
      run: |
        npm run format:check
        echo "✅ Code formatting verified"
    
    - name: Security Vulnerability Scan (npm audit)
      run: |
        npm audit --audit-level=moderate
        echo "✅ npm audit completed"
    
    - name: Snyk Security Scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high --file=package.json
        command: test
    
    - name: OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'quantum-ai-system'
        path: '.'
        format: 'JSON'
        args: >
          --enableRetired
          --enableExperimental
          --failOnCVSS 7
    
    - name: Upload Security Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          eslint-report.json
          reports/
        retention-days: 30

  # مرحلة الاختبارات الشاملة
  comprehensive-testing:
    name: 'Comprehensive Testing Suite'
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 30
    
    strategy:
      matrix:
        test-suite: ['unit', 'integration', 'quantum', 'security', 'ai']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --prefer-offline
    
    - name: Setup Test Environment
      run: |
        # إعداد Redis للاختبارات
        docker run -d --name redis-test -p 6379:6379 redis:7-alpine
        # إعداد MongoDB للاختبارات
        docker run -d --name mongo-test -p 27017:27017 mongo:7
        # انتظار جاهزية الخدمات
        sleep 10
    
    - name: Run ${{ matrix.test-suite }} Tests
      run: |
        case "${{ matrix.test-suite }}" in
          "unit")
            npm run test:unit -- --coverage --maxWorkers=2
            ;;
          "integration")
            npm run test:integration -- --coverage --maxWorkers=1
            ;;
          "quantum")
            npm run test:quantum -- --coverage --timeout=60000
            ;;
          "security")
            npm run test:security -- --coverage
            ;;
          "ai")
            npm run test:ai -- --coverage --timeout=30000
            ;;
        esac
      env:
        NODE_ENV: test
        REDIS_URL: redis://localhost:6379
        MONGODB_URL: mongodb://localhost:27017/quantum-test
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_TEST }}
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.test-suite }}
        path: |
          coverage/
          test-results/
          junit.xml
        retention-days: 30
    
    - name: Cleanup Test Environment
      if: always()
      run: |
        docker stop redis-test mongo-test || true
        docker rm redis-test mongo-test || true

  # مرحلة اختبارات الأداء
  performance-testing:
    name: 'Performance & Load Testing'
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --prefer-offline
    
    - name: Build Application
      run: npm run build
    
    - name: Start Application for Testing
      run: |
        npm start &
        sleep 30  # انتظار بدء التطبيق
        curl -f http://localhost:3000/health || exit 1
      env:
        NODE_ENV: production
    
    - name: Install k6
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6
    
    - name: Run Performance Tests
      run: |
        k6 run --out json=performance-results.json tests/performance/load-test.js
        k6 run --out json=stress-results.json tests/performance/stress-test.js
    
    - name: Upload Performance Results
      uses: actions/upload-artifact@v4
      with:
        name: performance-results
        path: |
          performance-results.json
          stress-results.json
        retention-days: 30

  # مرحلة البناء والحاويات
  build-and-containerize:
    name: 'Build & Containerize'
    runs-on: ubuntu-latest
    needs: [code-quality, comprehensive-testing]
    timeout-minutes: 20
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --prefer-offline --production=false
    
    - name: Build Application
      run: |
        npm run build
        npm run build:server
        echo "✅ Application build completed"
    
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker images
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          NODE_ENV=production
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          VCS_REF=${{ github.sha }}
    
    - name: Sign container image
      uses: sigstore/cosign-installer@v3
    
    - name: Sign the published Docker image
      env:
        COSIGN_EXPERIMENTAL: 1
      run: |
        cosign sign --yes ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  # مرحلة اختبارات الأمان للحاويات
  container-security:
    name: 'Container Security Scan'
    runs-on: ubuntu-latest
    needs: build-and-containerize
    timeout-minutes: 15
    
    steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ needs.build-and-containerize.outputs.image-tag }}
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Container Structure Test
      run: |
        curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
        chmod +x container-structure-test-linux-amd64
        sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test
        container-structure-test test --image ${{ needs.build-and-containerize.outputs.image-tag }} --config tests/container-structure-test.yaml

  # مرحلة اختبارات الكم الفعلية (اختيارية)
  quantum-hardware-tests:
    name: 'Quantum Hardware Integration Tests'
    runs-on: ubuntu-latest
    needs: comprehensive-testing
    if: github.event.inputs.run_quantum_tests == 'true' || (github.event_name == 'schedule')
    timeout-minutes: 45
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python for Qiskit
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Quantum Dependencies
      run: |
        pip install qiskit qiskit-aer qiskit-ibm-runtime amazon-braket-sdk
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --prefer-offline
    
    - name: Run Quantum Hardware Tests
      run: |
        npm run test:quantum:hardware -- --timeout=300000
      env:
        IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        BRAKET_BUCKET: ${{ secrets.BRAKET_BUCKET }}
    
    - name: Upload Quantum Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: quantum-hardware-results
        path: |
          quantum-test-results/
          quantum-hardware-latency.log
        retention-days: 90

  # مرحلة النشر للبيئة التجريبية
  deploy-staging:
    name: 'Deploy to Staging'
    runs-on: ubuntu-latest
    needs: [build-and-containerize, container-security]
    if: github.ref == 'refs/heads/develop' || github.event.inputs.deploy_environment == 'staging'
    environment:
      name: staging
      url: https://staging.quantum-ai.company.com
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        kubectl config current-context
    
    - name: Deploy to Staging
      run: |
        export KUBECONFIG=kubeconfig
        # تحديث الصور في ملفات Kubernetes
        sed -i "s|quantum-ai/.*:.*|${{ needs.build-and-containerize.outputs.image-tag }}|g" k8s-deployment.yaml
        
        # تطبيق التحديثات
        kubectl apply -f k8s-deployment.yaml -n quantum-ai-staging
        kubectl apply -f k8s-monitoring.yaml -n quantum-ai-staging
        
        # انتظار اكتمال النشر
        kubectl rollout status deployment/api-gateway -n quantum-ai-staging --timeout=300s
        kubectl rollout status deployment/quantum-core -n quantum-ai-staging --timeout=300s
        kubectl rollout status deployment/ai-agents -n quantum-ai-staging --timeout=300s
    
    - name: Run Smoke Tests
      run: |
        export KUBECONFIG=kubeconfig
        STAGING_URL=$(kubectl get service api-gateway-service -n quantum-ai-staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        # اختبارات الدخان الأساسية
        curl -f http://$STAGING_URL/health
        curl -f http://$STAGING_URL/api/v1/quantum/status
        curl -f http://$STAGING_URL/api/v1/ai/health
        
        echo "✅ Staging deployment successful"

  # مرحلة النشر للإنتاج
  deploy-production:
    name: 'Deploy to Production'
    runs-on: ubuntu-latest
    needs: [build-and-containerize, container-security, deploy-staging]
    if: github.ref == 'refs/heads/main' || github.event.inputs.deploy_environment == 'production'
    environment:
      name: production
      url: https://quantum-ai.company.com
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        kubectl config current-context
    
    - name: Pre-deployment Backup
      run: |
        export KUBECONFIG=kubeconfig
        # نسخ احتياطية من قواعد البيانات
        kubectl exec -n quantum-ai-system deployment/mongodb -- mongodump --out /tmp/backup-$(date +%Y%m%d-%H%M%S)
    
    - name: Blue-Green Deployment
      run: |
        export KUBECONFIG=kubeconfig
        
        # إنشاء نسخة خضراء جديدة
        sed -i "s|quantum-ai/.*:.*|${{ needs.build-and-containerize.outputs.image-tag }}|g" k8s-deployment.yaml
        sed -i 's/name: quantum-ai-system/name: quantum-ai-system-green/g' k8s-deployment.yaml
        
        # نشر النسخة الخضراء
        kubectl apply -f k8s-deployment.yaml
        
        # انتظار جاهزية النسخة الخضراء
        kubectl rollout status deployment/api-gateway -n quantum-ai-system-green --timeout=600s
        kubectl rollout status deployment/quantum-core -n quantum-ai-system-green --timeout=600s
        kubectl rollout status deployment/ai-agents -n quantum-ai-system-green --timeout=600s
        
        # اختبار النسخة الخضراء
        GREEN_URL=$(kubectl get service api-gateway-service -n quantum-ai-system-green -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        curl -f http://$GREEN_URL/health
        
        # تبديل الخدمات للنسخة الخضراء
        kubectl patch service api-gateway-service -n quantum-ai-system -p '{"spec":{"selector":{"version":"green"}}}'
        
        # حذف النسخة الزرقاء القديمة بعد التأكد
        sleep 60
        kubectl delete namespace quantum-ai-system-blue --ignore-not-found=true
        
        echo "✅ Production deployment successful"
    
    - name: Post-deployment Tests
      run: |
        export KUBECONFIG=kubeconfig
        PROD_URL=$(kubectl get service api-gateway-service -n quantum-ai-system -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        # اختبارات شاملة للإنتاج
        curl -f http://$PROD_URL/health
        curl -f http://$PROD_URL/api/v1/quantum/status
        curl -f http://$PROD_URL/api/v1/ai/health
        curl -f http://$PROD_URL/api/v1/security/status
        
        # اختبار الأداء السريع
        curl -w "@curl-format.txt" -o /dev/null -s http://$PROD_URL/api/v1/quantum/simple-circuit
    
    - name: Update Monitoring Dashboards
      run: |
        export KUBECONFIG=kubeconfig
        kubectl apply -f k8s-monitoring.yaml -n quantum-ai-system
        
        # إعادة تشغيل Grafana لتحديث اللوحات
        kubectl rollout restart deployment/grafana -n quantum-ai-system

  # مرحلة التنظيف والتقارير
  cleanup-and-reporting:
    name: 'Cleanup & Reporting'
    runs-on: ubuntu-latest
    needs: [deploy-production, quantum-hardware-tests]
    if: always()
    timeout-minutes: 10
    
    steps:
    - name: Cleanup old container images
      run: |
        # حذف الصور القديمة (الاحتفاظ بآخر 10)
        echo "Cleaning up old container images..."
        # سيتم تنفيذ هذا عبر GitHub API
    
    - name: Generate Deployment Report
      run: |
        echo "# Quantum AI System Deployment Report" > deployment-report.md
        echo "## Build Information" >> deployment-report.md
        echo "- **Commit SHA**: ${{ github.sha }}" >> deployment-report.md
        echo "- **Branch**: ${{ github.ref_name }}" >> deployment-report.md
        echo "- **Build Time**: $(date)" >> deployment-report.md
        echo "- **Image Tag**: ${{ needs.build-and-containerize.outputs.image-tag }}" >> deployment-report.md
        echo "" >> deployment-report.md
        echo "## Test Results" >> deployment-report.md
        echo "- Code Quality: ✅ Passed" >> deployment-report.md
        echo "- Security Scan: ✅ Passed" >> deployment-report.md
        echo "- Unit Tests: ✅ Passed" >> deployment-report.md
        echo "- Integration Tests: ✅ Passed" >> deployment-report.md
        echo "- Performance Tests: ✅ Passed" >> deployment-report.md
        
        if [ "${{ needs.quantum-hardware-tests.result }}" == "success" ]; then
          echo "- Quantum Hardware Tests: ✅ Passed" >> deployment-report.md
        else
          echo "- Quantum Hardware Tests: ⏭️ Skipped" >> deployment-report.md
        fi
    
    - name: Upload Deployment Report
      uses: actions/upload-artifact@v4
      with:
        name: deployment-report
        path: deployment-report.md
        retention-days: 90
    
    - name: Notify Teams
      if: github.ref == 'refs/heads/main' && env.SLACK_WEBHOOK_URL != ''
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        # إرسال إشعارات للفرق
        curl --fail --show-error --silent -X POST -H 'Content-type: application/json' \
          --data '{"text":"🚀 Quantum AI System deployed successfully to production!\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref_name }}"}' \
          "${{ env.SLACK_WEBHOOK_URL }}"

# إعدادات إضافية للـ Workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write  # للتوقيع بـ Cosign
