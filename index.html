<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="نظام كمي متقدم للذكاء الاصطناعي - Advanced Quantum AI Hybrid System for monitoring, security, and analytics"
    />
    <meta name="theme-color" content="#581c87" />
    <meta name="color-scheme" content="dark" />
    <meta property="og:title" content="Top1 Quantum AI System" />
    <meta property="og:description" content="Advanced Quantum AI Hybrid System - نظام الذكاء الاصطناعي الكمي المتقدم" />
    <meta property="og:type" content="website" />
    <title>Top1 Quantum AI | النظام الكمي المتقدم</title>
    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans',
          'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #0f172a 0%, #581c87 50%, #0f172a 100%);
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
      }

      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #a855f7;
        font-size: 1.5rem;
        font-weight: bold;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #581c87;
        border-top: 4px solid #a855f7;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-left: 1rem;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        جاري تحميل نظام الثورة الكمية...
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
