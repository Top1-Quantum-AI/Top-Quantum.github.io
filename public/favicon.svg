<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
  <!-- Atom nucleus -->
  <circle cx="32" cy="32" r="5" fill="#a855f7"/>
  <!-- Electron orbit 1 -->
  <ellipse cx="32" cy="32" rx="22" ry="8" stroke="#7c3aed" stroke-width="1.5" fill="none"/>
  <!-- Electron orbit 2 -->
  <ellipse cx="32" cy="32" rx="22" ry="8" stroke="#7c3aed" stroke-width="1.5" fill="none" transform="rotate(60 32 32)"/>
  <!-- Electron orbit 3 -->
  <ellipse cx="32" cy="32" rx="22" ry="8" stroke="#7c3aed" stroke-width="1.5" fill="none" transform="rotate(120 32 32)"/>
  <!-- Electrons -->
  <circle cx="54" cy="32" r="2.5" fill="#c084fc"/>
  <circle cx="21" cy="22" r="2.5" fill="#c084fc"/>
  <circle cx="21" cy="42" r="2.5" fill="#c084fc"/>
</svg>